# Languages the wiki supports. English is the canonical default; every other
# language is an AI-generated translation of the English source.
#
# This file is read at build time (astro.config.mjs) to configure Starlight's
# i18n locales and the language selector. `direction` is honored so a future
# right-to-left language can be added without layout changes.
languages:
  - code: en
    name: English
    direction: ltr
    default: true
  - code: it
    name: Italiano
    direction: ltr
  - code: es
    name: Español
    direction: ltr
  - code: pt
    name: Português
    direction: ltr
  - code: de
    name: Deutsch
    direction: ltr
  - code: fr
    name: Français
    direction: ltr
  - code: zh-Hans
    name: 简体中文
    direction: ltr
  - code: th
    name: ไทย
    direction: ltr
  - code: hi
    name: हिन्दी
    direction: ltr
  - code: ne
    name: नेपाली
    direction: ltr
  - code: ms
    name: Bahasa Melayu
    direction: ltr
  - code: ja
    name: 日本語
    direction: ltr
  - code: he
    name: עברית
    direction: rtl
  - code: ar
    name: العربية
    direction: rtl
